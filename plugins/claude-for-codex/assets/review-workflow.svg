<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Claude for Codex review workflow</title>
  <desc id="desc">A product screenshot style diagram of Codex sending read-only review context to Claude Code and receiving role-based findings.</desc>
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect x="72" y="64" width="1136" height="592" rx="24" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="112" y="126" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Claude for Codex</text>
  <text x="112" y="166" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Read-only Claude Code review from inside Codex</text>
  <rect x="112" y="220" width="290" height="300" rx="16" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="144" y="270" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#312E81">Codex</text>
  <text x="144" y="312" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Collects git context</text>
  <text x="144" y="348" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Keeps implementation control</text>
  <text x="144" y="384" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Reconciles findings</text>
  <rect x="494" y="220" width="290" height="300" rx="16" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="526" y="270" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#92400E">Claude Code</text>
  <text x="526" y="312" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Read, Grep, Glob only</text>
  <text x="526" y="348" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Independent critique</text>
  <text x="526" y="384" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">No mutation during review</text>
  <rect x="876" y="220" width="290" height="300" rx="16" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="908" y="270" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0F172A">Review roles</text>
  <text x="908" y="312" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Correctness</text>
  <text x="908" y="348" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Security</text>
  <text x="908" y="384" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Tests, release, adversarial</text>
  <path d="M418 370h58" stroke="#4F46E5" stroke-width="8" stroke-linecap="round"/>
  <path d="M464 348l26 22-26 22" fill="none" stroke="#4F46E5" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800 370h58" stroke="#4F46E5" stroke-width="8" stroke-linecap="round"/>
  <path d="M846 348l26 22-26 22" fill="none" stroke="#4F46E5" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="112" y="560" width="1054" height="46" rx="12" fill="#111827"/>
  <text x="144" y="590" font-family="SFMono-Regular, Consolas, monospace" font-size="17" fill="#E5E7EB">node plugins/claude-for-codex/scripts/claude-companion.mjs multi-review --base main</text>
</svg>
