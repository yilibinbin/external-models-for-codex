name: Antigravity for Codex Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: {{TIMEOUT_MINUTES}}
    env:
      ANTIGRAVITY_FOR_CODEX_MODEL_PROVIDER: "{{MODEL_PROVIDER}}"
      ANTIGRAVITY_FOR_CODEX_MODEL: "{{MODEL}}"
    steps:
      # This workflow intentionally uses pull_request with read-only contents
      # permissions. Provide an authenticated agy installation in CI before
      # enabling blocking automation.
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare pull request diff
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          {
            echo "Pull request diff base: $PR_BASE_SHA"
            echo "Pull request diff head: $PR_HEAD_SHA"
            echo
            git diff --stat "$PR_BASE_SHA" "$PR_HEAD_SHA"
            echo
            git diff "$PR_BASE_SHA" "$PR_HEAD_SHA" -- .
          } > /tmp/antigravity-pr-diff.txt

      - name: Install Codex and Antigravity for Codex
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @openai/codex
          codex plugin marketplace add yilibinbin/external-models-for-codex --ref {{RELEASE_REF}}
          codex plugin add antigravity-for-codex@external-models-for-codex
          codex plugin list --json > /tmp/codex-plugins.json
          ANTIGRAVITY_PLUGIN_ROOT=$(node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('/tmp/codex-plugins.json', 'utf8'));
          const installed = Array.isArray(payload.installed) ? payload.installed : [];
          const plugin = installed.find((item) =>
            item.pluginId === 'antigravity-for-codex@external-models-for-codex' ||
            (item.name === 'antigravity-for-codex' && item.marketplaceName === 'external-models-for-codex')
          );
          const root = plugin?.source?.path || plugin?.path || '';
          if (!root) {
            process.exit(1);
          }
          process.stdout.write(root);
          NODE
          )
          if [[ ! -f "$ANTIGRAVITY_PLUGIN_ROOT/scripts/antigravity-companion.mjs" ]]; then
            echo "Antigravity for Codex runtime was not found at installed plugin root: $ANTIGRAVITY_PLUGIN_ROOT" >&2
            exit 1
          fi
          echo "ANTIGRAVITY_PLUGIN_ROOT=$ANTIGRAVITY_PLUGIN_ROOT" >> "$GITHUB_ENV"

      - name: Run Antigravity review
        shell: bash
        run: |
          set -euo pipefail
          args=(review --model-provider "$ANTIGRAVITY_FOR_CODEX_MODEL_PROVIDER")
          if [[ -n "$ANTIGRAVITY_FOR_CODEX_MODEL" ]]; then
            args+=(--model "$ANTIGRAVITY_FOR_CODEX_MODEL")
          fi
          args+=("Review this pull request using the prepared PR diff below.

$(cat /tmp/antigravity-pr-diff.txt)")
          node "$ANTIGRAVITY_PLUGIN_ROOT/scripts/antigravity-companion.mjs" "${args[@]}"
